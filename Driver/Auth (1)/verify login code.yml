info:
  name: verify login code
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/api/driver/verify-otp"
  params:
    - name: ""
      value: ""
      type: query
      disabled: true
  body:
    type: multipart-form
    data:
      - name: phone
        type: text
        value: "1093373197"
      - name: phone_code
        type: text
        value: "+20"
      - name: code
        type: text
        value: "12345"

runtime:
  scripts:
    - type: after-response
      code: |-
        let response = res.getBody();

        bru.setEnvVar("driver_token", response.data.driver.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
