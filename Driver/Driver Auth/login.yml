info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/api/driver/login"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: phone
        type: text
        value: "1093973197"
      - name: phone_code
        type: text
        value: "+20"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
