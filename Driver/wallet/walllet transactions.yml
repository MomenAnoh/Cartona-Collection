info:
  name: walllet transactions
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/driver/user-walllet-transactions?month=2026-05"
  params:
    - name: month
      value: 2026-05
      type: query
  body:
    type: multipart-form
  auth:
    type: bearer
    token: "{{driver_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
