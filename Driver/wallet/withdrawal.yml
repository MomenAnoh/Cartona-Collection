info:
  name: withdrawal
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/api/driver/withdrawal?account_id=1"
  params:
    - name: account_id
      value: "1"
      type: query
  body:
    type: multipart-form
    data:
      - name: amount
        type: text
        value: "50"
  auth:
    type: bearer
    token: "{{driver_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
