info:
  name: assign delivery time
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/api/user/assign-delivery-time"
  headers:
    - name: Accept
      value: application/json
    - name: Accept-Language
      value: ar
  body:
    type: multipart-form
    data:
      - name: order_id
        type: text
        value: "4"
      - name: slot_id
        type: text
        value: "1"
  auth:
    type: bearer
    token: "{{user_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
