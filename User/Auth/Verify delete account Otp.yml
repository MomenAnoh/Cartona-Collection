info:
  name: Verify delete account Otp
  type: http
  seq: 8

http:
  method: POST
  url: "{{url}}/api/user/verify-delete_account-otp"
  headers:
    - name: Accept
      value: application/json
    - name: Accept-Language
      value: en
  body:
    type: multipart-form
    data:
      - name: code
        type: text
        value: "12345"
      - name: phone
        type: text
        value: "1093373197"
      - name: phone_code
        type: text
        value: "+20"
  auth:
    type: bearer
    token: "{{user_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
