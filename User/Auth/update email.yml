info:
  name: update email
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/api/user/update-email"
  headers:
    - name: Accept
      value: application/json
    - name: Accept-Language
      value: ar
  params:
    - name: ""
      value: ""
      type: query
      disabled: true
  body:
    type: multipart-form
    data:
      - name: email
        type: text
        value: moja@gmail.com
  auth:
    type: bearer
    token: "{{user_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
