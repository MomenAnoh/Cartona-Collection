info:
  name: verify update phone otp
  type: http
  seq: 12

http:
  method: POST
  url: "{{url}}/api/user/verify-update-phone-otp"
  body:
    type: multipart-form
    data:
      - name: phone_code
        type: text
        value: "+20"
      - name: phone
        type: text
        value: "8888888888"
      - name: code
        type: text
        value: "12345"
  auth:
    type: bearer
    token: "{{user_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
