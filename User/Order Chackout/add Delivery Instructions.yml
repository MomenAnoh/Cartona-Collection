info:
  name: add Delivery Instructions
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/api/user/add-delivery-instructions"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: order_id
        type: text
        value: "1"
      - name: delivery_instructions
        type: text
        value: put it front of the home
  auth:
    type: bearer
    token: "{{user_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
