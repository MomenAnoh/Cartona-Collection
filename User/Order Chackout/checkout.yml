info:
  name: checkout
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/user/checkout"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
  auth:
    type: bearer
    token: "{{user_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
