info:
  name: popular-search
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/user/popular-search"
  headers:
    - name: Accept
      value: application/json
    - name: Accept-Language
      value: ar
  body:
    type: multipart-form
  auth:
    type: bearer
    token: "{{user_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
