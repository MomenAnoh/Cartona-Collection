info:
  name: add Rating
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/api/user/add-stores-rating"
  headers:
    - name: Accept-Language
      value: ar
  body:
    type: multipart-form
    data:
      - name: store[0][store_id]
        type: text
        value: "1"
      - name: store[0][store_rate]
        type: text
        value: "5"
      - name: app_rating
        type: text
        value: "5"
      - name: note
        type: text
        value: gfgdnhdgfhdyg
  auth:
    type: bearer
    token: "{{user_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
