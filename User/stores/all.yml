info:
  name: all
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/user/stores"
  headers:
    - name: Accept
      value: application/json
    - name: Accept-Language
      value: en
  params:
    - name: newly_added
      value: "true"
      type: query
      disabled: true
    - name: sort_by
      value: rating
      type: query
      disabled: true
    - name: search
      value: Starbucks
      type: query
      disabled: true
    - name: top_rate
      value: "4.5"
      type: query
      disabled: true
    - name: main_category_id
      value: "1"
      type: query
      disabled: true
    - name: top_choice
      value: "true"
      type: query
      disabled: true
  body:
    type: multipart-form
  auth:
    type: bearer
    token: "{{user_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
